name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 22
          - 24
    steps:
      # These pinned stable majors run their action code on Node 24 while the
      # setup-node input below still selects the Node 22/24 test runtime.
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build

      - name: Use the release npm version
        if: matrix.node-version == 24
        run: npm install --global npm@^11.16.0

      - name: Verify publish artifacts
        if: matrix.node-version == 24
        run: pnpm verify:publish-artifacts
