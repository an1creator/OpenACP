name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Use an npm version with trusted publishing support
        run: npm install --global npm@^11.16.0

      - run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          node -e "
            const fs = require('fs');
            for (const file of ['package.json', 'packages/plugin-sdk/package.json']) {
              const pkg = JSON.parse(fs.readFileSync(file, 'utf-8'));
              pkg.version = '$VERSION';
              if (file.includes('plugin-sdk')) {
                pkg.peerDependencies['@n1creator/openacp-cli'] = '>=' + '$VERSION';
              }
              fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');
            }
          "

      - name: Build CLI types (needed by SDK)
        run: pnpm build

      - run: pnpm build:publish

      - name: Publish @n1creator/openacp-cli
        working-directory: dist-publish
        run: npm publish --access=public --provenance

      - name: Publish @n1creator/openacp-plugin-sdk
        if: hashFiles('dist-publish-sdk/package.json') != ''
        working-directory: dist-publish-sdk
        run: npm publish --access=public --provenance
