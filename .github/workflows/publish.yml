name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]
    steps:
      # Stable action majors with a Node 24 action runtime. The matrix remains
      # authoritative for the project runtime under test.
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: '${{ matrix.node-version }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - if: matrix.node-version == 24
        run: pnpm verify:publish-artifacts
      - name: Verify tag provenance and release metadata
        run: |
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs'); const v='$VERSION'; for(const f of ['package.json','packages/plugin-sdk/package.json']) { const p=JSON.parse(fs.readFileSync(f)); if(p.version!==v) throw Error(f+' version '+p.version+' != tag '+v) } const c=fs.readFileSync('CHANGELOG.md','utf8'); if(!c.includes('## '+v+' ')) throw Error('CHANGELOG missing release '+v)"

  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Use an npm version with trusted publishing support
        run: npm install --global npm@^11.16.0

      - run: pnpm install --frozen-lockfile

      - name: Verify release version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          node -e "for(const f of ['package.json','packages/plugin-sdk/package.json']){const p=require('./'+f);if(p.version!=='$VERSION')throw Error(f+' does not match tag')}"

      - name: Build CLI types (needed by SDK)
        run: pnpm build

      - run: pnpm build:publish

      - name: Pack and verify both artifacts before registry mutation
        run: |
          npm pack --dry-run ./dist-publish
          npm pack --dry-run ./dist-publish-sdk

      # The SDK declares the CLI as a peer dependency; the CLI has no runtime
      # dependency on the SDK. Publish CLI first so SDK latest is always usable.
      - name: Publish @n1creator/openacp-cli to latest
        working-directory: dist-publish
        run: |
          if npm view "@n1creator/openacp-cli@${VERSION}" version >/dev/null 2>&1; then
            LATEST="$(npm view "@n1creator/openacp-cli" dist-tags.latest)"
            if [ "$LATEST" = "$VERSION" ]; then
              echo "@n1creator/openacp-cli@${VERSION} is already latest; resuming partial release"
            else
              echo "::error::@n1creator/openacp-cli@${VERSION} exists but latest is ${LATEST}. Immutable versions cannot be republished and OIDC cannot repair dist-tags. Follow the interactive 2FA recovery runbook."
              exit 1
            fi
          else
            npm publish --access=public --tag latest
          fi

      - name: Publish @n1creator/openacp-plugin-sdk to latest
        if: hashFiles('dist-publish-sdk/package.json') != ''
        working-directory: dist-publish-sdk
        run: |
          if npm view "@n1creator/openacp-plugin-sdk@${VERSION}" version >/dev/null 2>&1; then
            LATEST="$(npm view "@n1creator/openacp-plugin-sdk" dist-tags.latest)"
            if [ "$LATEST" = "$VERSION" ]; then
              echo "@n1creator/openacp-plugin-sdk@${VERSION} is already latest; resuming partial release"
            else
              echo "::error::@n1creator/openacp-plugin-sdk@${VERSION} exists but latest is ${LATEST}. Immutable versions cannot be republished and OIDC cannot repair dist-tags. Follow the interactive 2FA recovery runbook."
              exit 1
            fi
          else
            npm publish --access=public --tag latest
          fi
